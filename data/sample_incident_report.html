<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Incident Timeline Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        critical: '#dc2626',
                        'critical-glow': '#fee2e2',
                    }
                }
            }
        }
    </script>
    <style>
        .critical-glow {
            box-shadow: inset 0 0 20px rgba(220, 38, 38, 0.3), 0 0 15px rgba(220, 38, 38, 0.2);
        }
        .timeline::before {
            content: '';
            position: absolute;
            left: 23px;
            top: 0;
            bottom: 0;
            width: 2px;
            background-color: #e5e7eb;
        }
        .timeline-item {
            position: relative;
            padding-left: 60px;
            margin-bottom: 20px;
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: 12px;
            top: 6px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 3px solid #e5e7eb;
            background-color: white;
        }
        .timeline-item.critical::before {
            background-color: #dc2626;
            border-color: #991b1b;
        }
        .timeline-item.high::before {
            background-color: #f59e0b;
            border-color: #b45309;
        }
        .timeline-item.low::before,
        .timeline-item.info::before {
            background-color: #10b981;
            border-color: #047857;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen py-8 px-4 sm:px-6 lg:px-8">
        <!-- Header -->
        <div class="max-w-6xl mx-auto">
            <div class="mb-8">
                <h1 class="text-4xl font-bold text-gray-900">Security Incident Timeline</h1>
                <p class="text-gray-600 mt-2">Chronological analysis of security events and detected threats</p>
            </div>

            <!-- KPI Cards -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white rounded-lg shadow p-6">
                    <div class="text-sm font-medium text-gray-600">Total Events</div>
                    <div class="mt-2 flex items-baseline">
                        <span class="text-3xl font-bold text-gray-900">37</span>
                    </div>
                </div>
                <div class="bg-white rounded-lg shadow p-6">
                    <div class="text-sm font-medium text-gray-600">Failed Logins</div>
                    <div class="mt-2 flex items-baseline">
                        <span class="text-3xl font-bold text-orange-600">16</span>
                    </div>
                </div>
                <div class="bg-white rounded-lg shadow p-6">
                    <div class="text-sm font-medium text-gray-600">Critical Alerts</div>
                    <div class="mt-2 flex items-baseline">
                        <span class="text-3xl font-bold text-red-600">1</span>
                    </div>
                </div>
            </div>

            <!-- Filter Controls -->
            <div class="bg-white rounded-lg shadow p-4 mb-8">
                <div class="flex flex-wrap gap-2">
                    <button class="filter-btn px-4 py-2 rounded-lg font-medium transition-colors" data-filter="all" onclick="filterEvents('all')">
                        Show All (37)
                    </button>
                    <button class="filter-btn px-4 py-2 rounded-lg font-medium transition-colors" data-filter="alerts" onclick="filterEvents('alerts')">
                        Alerts Only (3)
                    </button>
                    <button class="filter-btn px-4 py-2 rounded-lg font-medium transition-colors" data-filter="high-critical" onclick="filterEvents('high-critical')">
                        High/Critical (5)
                    </button>
                </div>
            </div>

            <!-- Timeline -->
            <div class="bg-white rounded-lg shadow p-8">
                <div class="timeline" id="timeline">
                    <!-- Events will be inserted here by JavaScript -->
                </div>
            </div>
        </div>
    </div>

        // Initialize timeline on page load
        document.addEventListener('DOMContentLoaded', function() {
            renderTimeline(allEvents);
            updateFilterButtons('all');
        });

        function filterEvents(filter) {
            currentFilter = filter;
            updateFilterButtons(filter);
            
            let filtered = allEvents;
            if (filter === 'alerts') {
                filtered = allEvents.filter(e => e.event_type.startsWith('ALERT_'));
            } else if (filter === 'high-critical') {
                filtered = allEvents.filter(e => ['HIGH', 'CRITICAL'].includes(e.severity));
            }
            
            renderTimeline(filtered);
        }

        function updateFilterButtons(activeFilter) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const isActive = btn.getAttribute('data-filter') === activeFilter;
                if (isActive) {
                    btn.classList.add('bg-blue-600', 'text-white');
                    btn.classList.remove('bg-gray-200', 'text-gray-900');
                } else {
                    btn.classList.remove('bg-blue-600', 'text-white');
                    btn.classList.add('bg-gray-200', 'text-gray-900');
                }
            });
        }

        function renderTimeline(events) {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = '';

            if (events.length === 0) {
                timeline.innerHTML = '<div class="text-center py-8 text-gray-500">No events to display</div>';
                return;
            }

            events.forEach((event, idx) => {
                const card = createEventCard(event, idx);
                timeline.appendChild(card);
            });
        }

        function createEventCard(event, idx) {
            const severityClass = event.severity.toLowerCase();
            const timelineItem = document.createElement('div');
            timelineItem.className = `timeline-item ${severityClass}`;
            timelineItem.id = `event-${idx}`;

            const bgClass = getBgClass(event.severity);
            const borderClass = getBorderClass(event.severity);
            const badgeClass = getBadgeClass(event.severity);

            const timestamp = new Date(event.timestamp);
            const timeStr = timestamp.toLocaleString();

            let extraInfo = '';
            if (event.metadata && event.metadata.user) {
                extraInfo += `<p class="text-sm text-gray-600"><strong>User:</strong> ${escapeHtml(event.metadata.user)}</p>`;
            }
            if (event.metadata && event.metadata.country) {
                extraInfo += `<p class="text-sm text-gray-600"><strong>Location:</strong> ${escapeHtml(event.metadata.city || 'N/A')}, ${escapeHtml(event.metadata.country)}</p>`;
            }
            if (event.metadata && event.metadata.isp) {
                extraInfo += `<p class="text-sm text-gray-600"><strong>ISP:</strong> ${escapeHtml(event.metadata.isp)}</p>`;
            }

            const eventTypeLabel = event.event_type.replace(/_/g, ' ');

            timelineItem.innerHTML = `
                <div class="bg-white rounded-lg p-4 ${borderClass} ${bgClass}" onclick="toggleCard(this)">
                    <div class="flex items-start justify-between">
                        <div class="flex-1">
                            <div class="flex items-center gap-2">
                                <span class="${badgeClass} px-2 py-1 rounded text-xs font-semibold">${event.severity}</span>
                                <span class="text-sm text-gray-500 font-mono">${event.event_type}</span>
                            </div>
                            <p class="text-xs text-gray-400 mt-1">${timeStr}</p>
                            <p class="text-sm text-gray-700 mt-2">${escapeHtml(event.description)}</p>
                            <div class="mt-3 hidden event-details">
                                ${extraInfo}
                                <p class="text-xs text-gray-500 mt-2"><strong>Source IP:</strong> <span class="font-mono">${escapeHtml(event.source_ip)}</span></p>
                            </div>
                        </div>
                        <span class="text-gray-400 ml-2 toggle-icon">▼</span>
                    </div>
                </div>
            `;

            return timelineItem;
        }

        function toggleCard(element) {
            const details = element.querySelector('.event-details');
            const icon = element.querySelector('.toggle-icon');
            
            details.classList.toggle('hidden');
            icon.textContent = details.classList.contains('hidden') ? '▼' : '▲';
        }

        function getBgClass(severity) {
            switch(severity.toUpperCase()) {
                case 'CRITICAL':
                    return 'border-l-4 border-red-600 bg-red-50 critical-glow';
                case 'HIGH':
                    return 'border-l-4 border-amber-500 bg-amber-50';
                case 'MEDIUM':
                    return 'border-l-4 border-yellow-400 bg-yellow-50';
                case 'LOW':
                case 'INFO':
                    return 'border-l-4 border-gray-300 bg-gray-50';
                default:
                    return 'border-l-4 border-gray-300';
            }
        }

        function getBorderClass(severity) {
            switch(severity.toUpperCase()) {
                case 'CRITICAL':
                    return 'border-2 border-red-600';
                case 'HIGH':
                    return 'border-2 border-amber-500';
                case 'MEDIUM':
                    return 'border border-yellow-400';
                case 'LOW':
                case 'INFO':
                    return 'border border-gray-200';
                default:
                    return 'border border-gray-200';
            }
        }

        function getBadgeClass(severity) {
            switch(severity.toUpperCase()) {
                case 'CRITICAL':
                    return 'bg-red-600 text-white';
                case 'HIGH':
                    return 'bg-amber-500 text-white';
                case 'MEDIUM':
                    return 'bg-yellow-400 text-gray-900';
                case 'LOW':
                case 'INFO':
                    return 'bg-green-500 text-white';
                default:
                    return 'bg-gray-500 text-white';
            }
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
